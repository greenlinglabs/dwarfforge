<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dwarf Forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0d0d0d;
      --panel:       #141414;
      --border:      #2a2a2a;
      --accent:      #c8651a;
      --accent-dim:  #7a3a0a;
      --accent-glow: #ff8c2a;
      --text:        #c8bfb0;
      --text-dim:    #6b6055;
      --text-bright: #f0e8d8;
      --success:     #5a9e5a;
      --warning:     #c8a020;
      --error:       #c84040;
      --mono:        'Share Tech Mono', monospace;
      --serif:       'Cinzel', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--serif);
      font-size: 18px;
      color: var(--accent-glow);
      letter-spacing: 2px;
      text-shadow: 0 0 12px var(--accent-dim);
    }

    .logo span { color: var(--text-dim); font-size: 14px; }

    .nav {
      display: flex;
      gap: 6px;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 12px;
      padding: 5px 14px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.15s;
    }

    .nav-btn:hover, .nav-btn.active {
      border-color: var(--accent);
      color: var(--accent-glow);
    }

    /* ── Main layout ── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .panel-left  { width: 340px; flex-shrink: 0; }
    .panel-right { flex: 1; }

    .panel-header {
      font-family: var(--serif);
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text-dim);
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Form controls ── */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .form-label .val {
      color: var(--accent-glow);
      font-weight: bold;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
      height: 3px;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: var(--accent);
    }

    select option { background: var(--panel); }

    /* ── Forge button ── */
    .forge-btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent-glow);
      font-family: var(--serif);
      font-size: 14px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .forge-btn:hover:not(:disabled) {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 20px var(--accent-dim);
    }

    .forge-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .cancel-btn {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--error);
      color: var(--error);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.15s;
      display: none;
    }

    .cancel-btn:hover { background: var(--error); color: var(--bg); }

    /* ── Log terminal ── */
    #log-output {
      flex: 1;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
      overflow-y: auto;
      padding: 14px 16px;
      background: var(--bg);
    }

    #log-output .log-error   { color: var(--error); }
    #log-output .log-warn    { color: var(--warning); }
    #log-output .log-success { color: var(--success); }
    #log-output .log-info    { color: var(--text-dim); }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }

    .progress-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .progress-track {
      height: 6px;
      background: var(--border);
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px var(--accent-dim);
    }

    /* ── Status badge ── */
    #ws-status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 2px;
      letter-spacing: 1px;
    }

    #ws-status.connected    { background: #1a3a1a; color: var(--success); border: 1px solid var(--success); }
    #ws-status.disconnected { background: #3a1a1a; color: var(--error);   border: 1px solid var(--error); }

    /* ── Worlds tab ── */
    #tab-worlds { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    #tab-worlds.active { display: flex; }
    #tab-forge  { display: flex; flex: 1; overflow: hidden; }
    #tab-forge.hidden { display: none; }

    .world-list {
      list-style: none;
      padding: 16px;
    }

    .world-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--border);
      padding: 10px 14px;
      margin-bottom: 8px;
      background: var(--panel);
    }

    .world-item:hover { border-color: var(--accent-dim); }

    .world-info { flex: 1; }
    .world-name { color: var(--text-bright); font-size: 14px; }
    .world-meta { color: var(--text-dim); font-size: 11px; margin-top: 3px; }

    .del-btn {
      background: transparent;
      border: 1px solid var(--error);
      color: var(--error);
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .del-btn:hover { background: var(--error); color: var(--bg); }

    .worlds-empty {
      padding: 40px 16px;
      color: var(--text-dim);
      text-align: center;
    }

    /* ── Section divider ── */
    .section-sep {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">⚒ Dwarf Forge <span>// world generation</span></div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="ws-status" class="disconnected">OFFLINE</span>
    <nav class="nav">
      <button class="nav-btn active" id="btn-forge" onclick="showTab('forge')">Generate</button>
      <button class="nav-btn" id="btn-worlds" onclick="showTab('worlds')">Worlds</button>
    </nav>
  </div>
</header>

<main>

  <!-- ── Forge tab ── -->
  <div id="tab-forge">

    <!-- Left panel: parameters -->
    <div class="panel panel-left">
      <div class="panel-header">WORLD PARAMETERS</div>
      <div class="panel-content" id="params-panel">

        <div class="form-group">
          <div class="form-label">World Name</div>
          <input type="text" id="p-title" value="Generated World" maxlength="48">
        </div>

        <div class="form-group">
          <div class="form-label">
            <span>World Size</span>
            <span class="val" id="lbl-world-size">medium (65×65)</span>
          </div>
          <select id="p-world-size" onchange="updateSizeLabel()">
            <option value="pocket">Pocket (17×17)</option>
            <option value="small">Small (33×33)</option>
            <option value="medium" selected>Medium (65×65)</option>
            <option value="large">Large (129×129)</option>
            <option value="huge">Huge (257×257)</option>
          </select>
        </div>

        <div class="form-group">
          <div class="form-label">
            <span>History Length (years)</span>
            <span class="val" id="lbl-history">250</span>
          </div>
          <select id="p-history" onchange="document.getElementById('lbl-history').textContent=this.value">
            <option value="25">25</option>
            <option value="100">100</option>
            <option value="250" selected>250</option>
            <option value="500">500</option>
            <option value="1050">1050</option>
          </select>
        </div>

        <div class="section-sep"></div>

        <!-- Slider params -->
        <div id="slider-params"></div>

        <div class="section-sep"></div>

        <div class="form-group">
          <div class="form-label">Seed <span style="color:var(--text-dim);font-size:10px;">(-1 = random)</span></div>
          <input type="number" id="p-seed" value="-1">
        </div>

        <button class="forge-btn" id="forge-btn" onclick="startGeneration()">⚒ FORGE WORLD</button>
        <button class="cancel-btn" id="cancel-btn" onclick="cancelGeneration()">✕ CANCEL</button>

      </div>
    </div>

    <!-- Right panel: log -->
    <div class="panel panel-right">
      <div class="panel-header">GENERATION LOG</div>
      <pre id="log-output"></pre>
      <div class="progress-bar-wrap">
        <div class="progress-label">
          <span id="progress-label-text">IDLE</span>
          <span id="progress-pct">—</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
    </div>

  </div><!-- /#tab-forge -->

  <!-- ── Worlds tab ── -->
  <div id="tab-worlds">
    <div style="flex:1;overflow-y:auto;">
      <div class="panel-header" style="padding:10px 16px;border-bottom:1px solid var(--border);">SAVED WORLDS</div>
      <div id="worlds-container"></div>
    </div>
  </div>

</main>

<script>
// ── Slider definitions ──
const SLIDERS = [
  { id: "p-num-civs",      label: "Civilizations",    min: 0, max: 20,  def: 5,   param: "num_civs" },
  { id: "p-site-civs",     label: "Site Civilizations", min: 0, max: 10, def: 3,  param: "num_site_civs" },
  { id: "p-megabeast",     label: "Megabeasts",        min: 0, max: 20,  def: 10,  param: "megabeast_cap" },
  { id: "p-semi",          label: "Semi-Megabeasts",   min: 0, max: 40,  def: 20,  param: "semimegabeast_cap" },
  { id: "p-titans",        label: "Titans",             min: 0, max: 20,  def: 10,  param: "titan_number" },
  { id: "p-demons",        label: "Demons",             min: 0, max: 500, def: 200, param: "demon_number" },
  { id: "p-vampires",      label: "Vampires",           min: 0, max: 200, def: 50,  param: "vampire_number" },
  { id: "p-werebeasts",    label: "Werebeasts",         min: 0, max: 200, def: 50,  param: "werebeast_number" },
];

// Build slider DOM
(function buildSliders() {
  const container = document.getElementById("slider-params");
  SLIDERS.forEach(s => {
    container.innerHTML += `
      <div class="form-group">
        <div class="form-label">
          <span>${s.label}</span>
          <span class="val" id="lbl-${s.id}">${s.def}</span>
        </div>
        <input type="range" id="${s.id}" min="${s.min}" max="${s.max}" value="${s.def}"
          oninput="document.getElementById('lbl-${s.id}').textContent=this.value">
      </div>`;
  });
})();

function updateSizeLabel() {
  const sel = document.getElementById("p-world-size");
  const map = { pocket:"pocket (17×17)", small:"small (33×33)", medium:"medium (65×65)", large:"large (129×129)", huge:"huge (257×257)" };
  document.getElementById("lbl-world-size").textContent = map[sel.value] || sel.value;
}

// ── Tab switching ──
function showTab(tab) {
  document.getElementById("tab-forge").classList.toggle("hidden", tab !== "forge");
  document.getElementById("tab-worlds").classList.toggle("active", tab === "worlds");
  document.getElementById("btn-forge").classList.toggle("active", tab === "forge");
  document.getElementById("btn-worlds").classList.toggle("active", tab === "worlds");
  if (tab === "worlds") loadWorlds();
}

// ── Log helpers ──
const logEl = document.getElementById("log-output");

function appendLog(line) {
  const span = document.createElement("span");
  const l = line.toLowerCase();
  if (l.includes("error") || l.includes("fatal"))        span.className = "log-error";
  else if (l.includes("warn") || l.includes("caution"))  span.className = "log-warn";
  else if (l.includes("saved") || l.includes("complete") || l.includes("success")) span.className = "log-success";
  else if (line.startsWith(">"))                          span.className = "log-info";
  span.textContent = line + "\n";
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() {
  logEl.innerHTML = "";
}

// ── Progress bar ──
function setProgress(pct) {
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-pct").textContent = pct + "%";
}

function setProgressLabel(text) {
  document.getElementById("progress-label-text").textContent = text;
}

// ── Generation state ──
let generating = false;

function setGenerating(flag) {
  generating = flag;
  document.getElementById("forge-btn").disabled = flag;
  document.getElementById("cancel-btn").style.display = flag ? "block" : "none";
  setProgressLabel(flag ? "GENERATING..." : "IDLE");
  if (!flag) setProgress(0);
}

// ── WebSocket ──
let ws = null;
let wsReconnectTimer = null;

function connectWS() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws/log`);

  ws.onopen = () => {
    document.getElementById("ws-status").textContent = "LIVE";
    document.getElementById("ws-status").className = "connected";
    clearTimeout(wsReconnectTimer);
  };

  ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); }
    catch { appendLog(evt.data); return; }

    switch (msg.type) {
      case "log":
        appendLog(msg.line);
        break;
      case "progress":
        setProgress(msg.pct);
        break;
      case "status":
        if (msg.state === "running") setGenerating(true);
        else setGenerating(false);
        break;
      case "complete":
        setGenerating(false);
        setProgress(msg.success ? 100 : 0);
        setProgressLabel(msg.success ? "COMPLETE" : "FAILED");
        if (msg.success) {
          appendLog("> ✓ World generation complete.");
          setProgress(100);
        } else {
          appendLog("> ✗ Generation failed: " + (msg.error || "unknown error"));
        }
        break;
      case "ping":
        break;
    }
  };

  ws.onclose = () => {
    document.getElementById("ws-status").textContent = "OFFLINE";
    document.getElementById("ws-status").className = "disconnected";
    wsReconnectTimer = setTimeout(connectWS, 3000);
  };

  ws.onerror = () => { ws.close(); };
}

// ── API calls ──
function getConfig() {
  const cfg = {
    title: document.getElementById("p-title").value.trim() || "Generated World",
    world_size: document.getElementById("p-world-size").value,
    history: parseInt(document.getElementById("p-history").value),
    seed: parseInt(document.getElementById("p-seed").value),
  };
  SLIDERS.forEach(s => {
    cfg[s.param] = parseInt(document.getElementById(s.id).value);
  });
  return cfg;
}

async function startGeneration() {
  clearLog();
  setProgress(0);
  setProgressLabel("STARTING...");
  appendLog("> Sending generation request...");

  try {
    const resp = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(getConfig()),
    });
    if (resp.status === 409) {
      appendLog("> A generation is already running.");
      return;
    }
    if (!resp.ok) {
      const err = await resp.text();
      appendLog("> Error: " + err);
      return;
    }
    setGenerating(true);
    appendLog("> Generation started.");
  } catch (e) {
    appendLog("> Failed to contact server: " + e);
  }
}

async function cancelGeneration() {
  try {
    await fetch("/api/cancel", { method: "POST" });
    appendLog("> Cancellation requested.");
  } catch (e) {
    appendLog("> Cancel failed: " + e);
  }
}

// ── Worlds tab ──
async function loadWorlds() {
  const container = document.getElementById("worlds-container");
  container.innerHTML = `<div class="worlds-empty">Loading...</div>`;
  try {
    const resp = await fetch("/api/worlds");
    const worlds = await resp.json();
    if (!worlds.length) {
      container.innerHTML = `<div class="worlds-empty">No worlds generated yet.<br>Forge one to begin.</div>`;
      return;
    }
    const ul = document.createElement("ul");
    ul.className = "world-list";
    worlds.forEach(w => {
      const date = new Date(w.created * 1000).toLocaleString();
      const size = formatBytes(w.size_bytes);
      const li = document.createElement("li");
      li.className = "world-item";
      li.innerHTML = `
        <div class="world-info">
          <div class="world-name">${escHtml(w.name)}</div>
          <div class="world-meta">${date} &nbsp;·&nbsp; ${size}</div>
        </div>
        <button class="del-btn" onclick="deleteWorld('${escHtml(w.name)}', this)">DELETE</button>`;
      ul.appendChild(li);
    });
    container.innerHTML = "";
    container.appendChild(ul);
  } catch (e) {
    container.innerHTML = `<div class="worlds-empty">Error loading worlds: ${e}</div>`;
  }
}

async function deleteWorld(name, btn) {
  if (!confirm(`Delete world "${name}"? This cannot be undone.`)) return;
  btn.disabled = true;
  btn.textContent = "...";
  try {
    const resp = await fetch(`/api/worlds/${encodeURIComponent(name)}`, { method: "DELETE" });
    if (resp.ok) {
      btn.closest(".world-item").remove();
    } else {
      alert("Delete failed.");
      btn.disabled = false;
      btn.textContent = "DELETE";
    }
  } catch (e) {
    alert("Error: " + e);
    btn.disabled = false;
    btn.textContent = "DELETE";
  }
}

function formatBytes(b) {
  if (b < 1024) return b + " B";
  if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
  return (b / 1048576).toFixed(1) + " MB";
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Init ──
connectWS();
appendLog("> Dwarf Forge ready. Configure parameters and press ⚒ FORGE WORLD.");
</script>
</body>
</html>
